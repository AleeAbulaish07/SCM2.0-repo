<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::section}, ~{::title}, ~{::script})}">

<head>
    <title>Login Page</title>
</head>

<body>

<section class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900 px-4">

    <!-- Card -->
    <div
        class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-2xl shadow-lg border-t-4 border-green-700 p-8"
    >

        <!-- message -->

        <div data-th-replace="message::messagebox"></div>

        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">
            Login Here
        </h2>

        <p class="text-gray-500 dark:text-gray-400 mt-1 mb-6">
            Welcome back to SCM 2.0
        </p>

        <div class="text-red-600" th:if="${param.error}">
            Invalid username and password.
        </div>
		<div class="text-green-600" th:if="${param.logout}">
			You have been logged out.
        </div>

        <!-- this is form -->

        <form
        th:action="@{/authenticate}"
        method="post"
        class="space-y-5"
        >

            <!-- Email -->

            <div>

                <label
                    for="email"
                    class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">
                    Email
                </label>

                <input
                    name="email"
                    type="email"
                    id="email"
                    placeholder="name@flowbite.com"

                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                    focus:ring-2 focus:ring-blue-500 focus:outline-none
                    bg-gray-50 dark:bg-gray-700
                    text-gray-900 dark:text-white
                    placeholder-gray-400"
                />

            </div>

            <!-- Password -->

            <div>

                <label
                    class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    id="password"

                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                    focus:ring-2 focus:ring-blue-500 focus:outline-none
                    bg-gray-50 dark:bg-gray-700
                    text-gray-900 dark:text-white"
                />

            </div>

            <!-- Button -->

            <div class="flex justify-center gap-4 pt-3">

                <button
                    type="submit"

                    class="px-5 py-2.5 rounded-lg
                    bg-gray-800 text-white hover:bg-gray-900
                    dark:bg-blue-600 dark:hover:bg-blue-700
                    transition">

                    Login

                </button>

                <button 
                type="reset"
                    class="px-5 py-2.5 rounded-lg bg-red-500 text-white hover:bg-red-600 transition">
                    Reset
                </button>

            </div>
        </form>

        <div 
        class="social-buttons-container flex justify-center items-center flex-col space-y-4 mt-5">

        <a class="px-3 py-2 login-with-google-btn text-center"
        >

    <a
        data-th-href="@{/oauth2/authorization/google}"
        class="flex items-center w-1/2 gap-3 font-semibold border border-gray-300 px-4 py-2 rounded-lg bg-white hover:bg-gray-100 transition"
    >

        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" fill-rule="evenodd">
                <path d="M17.6 9.2l-.1-1.8H9v3.4h4.8c-.2 1-.8 2-1.8 2.8v2.2h3a8.8 8.8 0 0 0 2.6-6.6z"
                    fill="#4285F4"/>
                <path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z"
                    fill="#34A853"/>
                <path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z"
                    fill="#FBBC05"/>
                <path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.8z"
                    fill="#EA4335"/>
            </g>
        </svg>

        <span class="text-gray-700 font-medium">
            Sign in With Google
        </span>
    </a>

    <!-- GitHub Login Button -->

    <a 
    data-th-href="@{/oauth2/authorization/github}"
    type="button" 
    class="py-2 px-2 w-1/2 flex justify-center items-center bg-gray-600 hover:bg-gray-700 focus:ring-gray-500 focus:ring-offset-gray-200 text-white  transition ease-in duration-200 text-center text-base font-semibold shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 rounded-lg">
    <svg 
    xmlns="http://www.w3.org/2000/svg" 
    width="20" 
    height="20" 
    fill="currentColor" 
    class="mr-2" 
    viewBox="0 0 1792 1792">
    <path 
    d="M896 128q209 0 385.5 103t279.5 279.5 103 385.5q0 251-146.5 451.5t-378.5 277.5q-27 5-40-7t-13-30q0-3 .5-76.5t.5-134.5q0-97-52-142 57-6 102.5-18t94-39 81-66.5 53-105 20.5-150.5q0-119-79-206 37-91-8-204-28-9-81 11t-92 44l-38 24q-93-26-192-26t-192 26q-16-11-42.5-27t-83.5-38.5-85-13.5q-45 113-8 204-79 87-79 206 0 85 20.5 150t52.5 105 80.5 67 94 39 102.5 18q-39 36-49 103-21 10-45 15t-57 5-65.5-21.5-55.5-62.5q-19-32-48.5-52t-49.5-24l-20-3q-21 0-29 4.5t-5 11.5 9 14 13 12l7 5q22 10 43.5 38t31.5 51l10 23q13 38 44 61.5t67 30 69.5 7 55.5-3.5l23-4q0 38 .5 88.5t.5 54.5q0 18-13 30t-40 7q-232-77-378.5-277.5t-146.5-451.5q0-209 103-385.5t279.5-279.5 385.5-103zm-477 1103q3-7-7-12-10-3-13 2-3 7 7 12 9 6 13-2zm31 34q7-5-2-16-10-9-16-3-7 5 2 16 10 10 16 3zm30 45q9-7 0-19-8-13-17-6-9 5 0 18t17 7zm42 42q8-8-4-19-12-12-20-3-9 8 4 19 12 12 20 3zm57 25q3-11-13-16-15-4-19 7t13 15q15 6 19-6zm63 5q0-13-17-11-16 0-16 11 0 13 17 11 16 0 16-11zm58-10q-2-11-18-9-16 3-14 15t18 8 14-14z"></path>
    </svg>
    Sign in with GitHub
</a>

    </div>
    </div>
</section>

<script>

    console.log("Login page");

</script>

</body>
</html>
