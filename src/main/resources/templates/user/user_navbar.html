<div th:fragment="user-navbar">

 <nav
    class="bg-white dark:bg-gray-900 text-black dark:text-white sm:pl-64 fixed top-0 left-0 w-full right-0 z-20 border-b border-gray-300 dark:border-gray-700 shadow-sm"
    >
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
    >

    <button data-drawer-target="logo-sidebar" data-drawer-toggle="logo-sidebar" aria-controls="logo-sidebar" type="button" class="text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base ms-3 mt-3 text-sm p-2 focus:outline-none inline-flex sm:hidden">
    <span class="sr-only">Open sidebar</span>
    <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
    <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10"/>
    </svg>
    </button>

    <!-- Brand -->
    <a data-th-href="@{'/home'}" class="flex items-center space-x-3">
        <img data-th-src="@{'/images/telephone.png'}"
            class="h-8 w-8 shadow rounded-full"
            alt="Logo" />

        <span class="text-xl font-semibold tracking-wide">
        SCM2.0
        </span>
        </a>

    <!-- Right Side -->
    <div class="flex items-center gap-3 md:order-2">

        <!-- Theme Toggle -->
        <button
        id="theme_change_button"
        class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm bg-gray-200 dark:bg-gray-700 text-black dark:text-white hover:scale-105 transition-all duration-200">

        <i class="fa-solid fa-circle-half-stroke"></i>
        <span>dark</span>

        </button>

        <!-- Dashboard -->
        <a
        data-th-href="@{'/user/dashboard'}"
        class="px-4 py-2 rounded-lg text-sm hover:text-blue-600 dark:hover:text-blue-400 transition">

        Dashboard

        </a>

        <!-- Profile -->
        <a
        data-th-href="@{'/user/profile'}"
        class="px-4 py-2 rounded-lg text-sm bg-green-600 text-white hover:bg-green-700 transition shadow">

        <span data-th-text="${loggedInUser.name}"></span>

        </a>

        <!-- Logout -->
        <form th:action="@{/do-logout}" method="post">

        <button
            type="submit"
            class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white hover:bg-red-700 transition">

            Logout

        </button>

        </form>

        <!-- Mobile Menu Button -->
        <button
        data-collapse-toggle="navbar-cta"
        type="button"
        class="md:hidden p-2 text-black dark:text-white">

        ☰

        </button>

        </div>

        <!-- Menu -->
        <div class="hidden w-full md:flex md:w-auto" id="navbar-cta">

        <ul class="flex flex-col md:flex-row md:space-x-8 mt-4 md:mt-0 font-medium">

        <li>
            <a
                data-th-href="@{'/home'}"
                class="block py-2 hover:text-blue-600 dark:hover:text-blue-400 transition">

                Home

            </a>
            </li>

        <li>
            <a
                data-th-href="@{'/about'}"
                class="block py-2 hover:text-blue-600 dark:hover:text-blue-400 transition">

            About

            </a>
        </li>

        <li>
            <a
                data-th-href="@{'/services'}"
                class="block py-2 hover:text-blue-600 dark:hover:text-blue-400 transition">

            Services

            </a>
        </li>

        <li>
            <a
                data-th-href="@{'/contact'}"
                class="block py-2 hover:text-blue-600 dark:hover:text-blue-400 transition">

            Contact

            </a>
        </li>

        </ul>

        </div>

    </div>

    </nav>

</div>
